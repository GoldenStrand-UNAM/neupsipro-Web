<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrar Publicación Prueba</title>
</head>
<body>

  <h2>Registrar publi (prueba)</h2>

  <label>ID Usuario (temporal, sin JWT)</label><br>
  <input type="number" id="id_usuario" value="1"><br><br>

  <label>Título *</label><br>
  <input type="text" id="titulo" placeholder="Título de la publicación" size="40"><br><br>

  <label>Contenido</label><br>
  <textarea id="contenido" rows="4" cols="40" placeholder="Cuerpo de la publicación"></textarea><br><br>

  <label>Imagen</label><br>
  <input type="file" id="imagen" accept="image/jpeg,image/png,image/webp"><br><br>

  <button onclick="registrar()">Publicar ahora</button>

  <hr>
  <h3>Respuesta del servidor</h3>
  <pre id="respuesta">—</pre>

  <script>
    const API = 'http://localhost:3000/Foro/registrar';

    async function registrar() {
      const titulo     = document.getElementById('titulo').value.trim();
      const contenido  = document.getElementById('contenido').value.trim();
      const imagen     = document.getElementById('imagen').files[0];
      const id_usuario = document.getElementById('id_usuario').value;

      if (!titulo) {
        return;
      }

      const formData = new FormData();
      formData.append('id_usuario', id_usuario);
      formData.append('titulo', titulo);
      if (contenido) formData.append('contenido', contenido);
      if (imagen)    formData.append('imagen', imagen);

      try {
        const response = await fetch(API, {
          method: 'POST',
          body: formData, 
        });
        const data = await response.json();
        mostrar(data);
      } catch (err) {
        mostrar({ error: err.message });
      }
    }

    function mostrar(data) {
      document.getElementById('respuesta').textContent = JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>
