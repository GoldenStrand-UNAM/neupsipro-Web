    <div class="flex-1 flex flex-col">
        <!-- Head Bar -->

                <button id="menuBtn" class="md:hidden text-white p-4">

                <div class="flex items-center gap-2 text-white text-xl p-4">

            <div class="flex items-center gap-3">

    <div class="w-full h-full bg-gray-200 rounded-3xl p-6">
        </div>
        </main>

    </div>
    <div id="logoutModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

        <div class="relative bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl text-center">
            <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full border-4 border-gray-100 mb-6">
                <span class="text-4xl font-light text-gray-800">!</span>
            </div>

            <h2 class="text-2xl font-bold text-gray-900 mb-2">Confirmar cierre de sesión</h2>
            <p class="text-gray-600 mb-8 px-4">
                ¿Estás seguro de querer cerrar sesión? Tendrás que volver a iniciar sesión para acceder a tu cuenta.
            </p>

            <div class="flex flex-col sm:flex-row gap-4">
                <button id="cancelLogout" class="flex-1 flex items-center justify-center gap-3 px-4 py-3 border border-gray-300 rounded-2xl font-semibold text-gray-700 hover:bg-gray-50 transition-colors group">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">

                    </svg>  
                    <span class="whitespace-nowrap">Cancelar</span>
                </button>
                <button id="confirmLogout" class="flex-1 flex items-center justify-center gap-3 px-4 py-3 bg-red-600 rounded-2xl font-semibold text-white hover:bg-red-700 transition-colors group">
                    <svg xlmns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
                    </svg>
                    <span class="whitespace-nowrap">Cerrar sesión</span>
                </button>
            </div>
        </div>
    </div>

</body>
</html>

<script>
    const btn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const logoutBtn = document.getElementById('logoutBtn');
    const logoutModal = document.getElementById('logoutModal');
    const cancelLogout = document.getElementById('cancelLogout');
    const confirmLogout = document.getElementById('confirmLogout');

    btn.addEventListener("click", () => {
        sidebar.classList.remove("-translate-x-full");
        overlay.classList.remove("hidden");
    });

    overlay.addEventListener("click", () => {
        sidebar.classList.add("-translate-x-full");
        overlay.classList.add("hidden");
    });

    const closeBtn = document.getElementById("closeBtn");

    closeBtn.addEventListener("click", () => {
        sidebar.classList.add("-translate-x-full");
        overlay.classList.add("hidden");
    });

    const navButtons = document.querySelectorAll('.nav-button');

    navButtons.forEach(button => {
        button.addEventListener('click', () => {
            navButtons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
        });
    });

    logoutBtn.addEventListener('click', (e) => {
        e.preventDefault();
        logoutModal.classList.remove('hidden');
    });

    cancelLogout.addEventListener('click', () => {
        logoutModal.classList.add('hidden');
    });

    confirmLogout.addEventListener('click', async () => {
        const token = localStorage.getItem('token'); // Aquí es la logica para el token, donde se guarda

        try {
            const response = await fetch('http://localhost:3000/auth/logout', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                localStorage.removeItem('token');
                window.location.href = '/login.html';
            } else {
                alert('Error al cerrar sesión');
            }
        } catch (error) {
            console.error('Error:', error);
        }
    });
</script>
