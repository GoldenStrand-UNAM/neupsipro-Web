<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>NeuPsi-Pro</title>
        <link rel="stylesheet" href="../css/output.css">

    </head>
    <body class="bg-[#BA8700]">

        <section>
            <div class="login-triangle-blue"></div>
            <div class="login-triangle-gray"></div>
            <div class="flex flex-col items-center justify-center mt-7">
                <img src="../assets/enes-white-logo.svg" alt="Logo ENES" class="logo-white"/>
                <h1 class="title">NeuPsi-Pro</h1>

            <div class="login-form">

    <!-- Usuario -->
    <div class="input-div">
      <label>Usuario</label>
      <input type="text" placeholder="Nombre de usuario" class="input-base">
    </div>

    <!-- Contraseña -->
    <div class="input-div">
      <label>Contraseña</label>
      <input type="password" id="passwordInput" placeholder="***********" class="input-base">

      <!-- Icono -->
      <svg id="togglePassword" class="w-5 h-5 absolute right-3 top-9 text-gray-400 cursor-pointer"
        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
      </svg>
    </div>

    <button class="btn-big bg-[#3350A9]">
      <svg class="white-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
      </svg>
      <span>Iniciar Sesión</span>
    </button>

  </div>
              </div>
        </section>


    </body>
    <script src="../../main.js"></script>
</html>
